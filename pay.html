<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스승님 | 안전 결제 시스템</title>
    <script src="https://js.bootpay.co.kr/bootpay-4.3.4.min.js" type="application/javascript"></script>
    <style>
        body { margin: 0; background-color: #F8FAFC; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Pretendard', sans-serif; }
        .loader-container { text-align: center; }
        .loader { width: 48px; height: 48px; border: 5px solid #0066FF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .msg { margin-top: 20px; font-weight: 800; color: #0F172A; font-size: 18px; }
        .sub-msg { font-size: 13px; color: #64748B; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="loader"></div>
        <p id="msg" class="msg">안전 결제 모듈을 호출하고 있습니다</p>
        <p class="sub-msg">잠시만 기다려 주세요...</p>
    </div>

    <script>
        async function startPayment() {
            const params = new URLSearchParams(window.location.search);
            
            // 1. 데이터 수집 (index에서 넘어온 값들)
            const price = parseInt(params.get('price')) || 0;
            const userName = params.get('userName') || "고객";
            const orderName = params.get('name') || "레슨권 결제"; 
            const requestId = params.get('requestId') || `TKT_${Date.now()}`;
            
            // 2. 앱스 스크립트 변수명과 일치시키기 위한 파싱
            // orderName 예시: "[스승님] 곽시랑 스승 - 3회 집중 패키지"
            const nameParts = orderName.split(' - ');
            const proName = nameParts[0].replace('[스승님] ', ''); 
            const lessonCount = nameParts[1] || "회차미정";
            const userPhone = "-"; // 필요시 index에서 추가로 넘겨받아야 함
            const proPhone = "-";  // 필요시 index에서 추가로 넘겨받아야 함

            const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzfqHWO3J48sE3XbfOvWgXUkULhIh3MdETumpw9GbFNeCr-R3F392bH7Sj6ZVcs1VZYhw/exec";

            if (price <= 0) {
                document.getElementById('msg').innerText = "결제 금액이 올바르지 않습니다.";
                return;
            }

            // [1단계] 시트 '결제 대기' 기록 (앱스 스크립트 변수명에 정확히 맞춤)
            try {
                await fetch(GOOGLE_SHEET_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "addLessonTicket",
                        userName: userName,
                        userPhone: userPhone,
                        proName: proName,
                        lessonCount: lessonCount,
                        proPhone: proPhone,
                        price: price,
                        status: "결제 대기",
                        requestId: requestId
                    })
                });
            } catch (e) { console.error("데이터 기록 실패:", e); }

            // [2단계] 부트페이 결제창 호출
            try {
                const response = await Bootpay.requestPayment({
                    "application_id": "67ecd171d9af4e5c6d21736b",
                    "price": price,
                    "order_name": orderName,
                    "order_id": requestId,
                    "pg": "nicepay",
                    "method": "card",
                    "user": { "username": userName },
                    "extra": { "open_type": "iframe" }
                });

                if (response.event === 'done') {
                    document.getElementById('msg').innerText = "결제 성공! 상태 업데이트 중...";

                    // [3단계] 시트 상태 '결제완료'로 업데이트
                    await fetch(GOOGLE_SHEET_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            action: "updateTicketStatus",
                            requestId: requestId,
                            status: "미지급(결제완료)"
                        })
                    });
                    
                    // 성공 페이지 이동 (금액, ID, retry 포함)
                    location.href = `success.html?price=${price}&requestId=${requestId}&retry=1`;
                }
            } catch (e) {
                alert("결제 오류 발생: " + e.message);
                window.history.back();
            }
        }

        window.onload = startPayment;
    </script>
</body>
</html>
